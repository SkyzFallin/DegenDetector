services:
  db:
    image: postgres:16
    environment:
      POSTGRES_USER: spike
      POSTGRES_PASSWORD: spike
      POSTGRES_DB: spike
    ports: ["5432:5432"]
    volumes: [dbdata:/var/lib/postgresql/data]

  redis:
    image: redis:7
    ports: ["6379:6379"]

  backend:
    build: ./backend
    environment:
      DATABASE_URL: postgresql+psycopg://spike:spike@db:5432/spike
      REDIS_URL: redis://redis:6379/0
      POLY_WS_URL: wss://ws-subscriptions-clob.polymarket.com/ws/market
      BIN_SECONDS: 60
      BASELINE_BINS: 360
      ROBUST_Z_THRESH: 6
      MIN_CONTRACTS: 50
      COOLDOWN_SECONDS: 300
      EWMA_LAMBDA: 0.2
    depends_on: [db, redis]
    ports: ["8000:8000"]

  frontend:
    build: ./frontend
    environment:
      NEXT_PUBLIC_API_BASE: http://localhost:8000
    depends_on: [backend]
    ports: ["3000:3000"]

volumes:
  dbdata: